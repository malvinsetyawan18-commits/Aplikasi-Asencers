name: Build & Deploy Flutter APK

on:
  push:
    branches: [ main ] # Pastikan branch utama kamu namanya 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Java (Dibutuhkan untuk Android Build)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Setup Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 3. Ambil Dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Build APK Release
      - name: Build APK
        run: flutter build apk --release

      # 5. TAMBAHKAN INI: Menyimpan APK di GitHub agar bisa langsung diunduh
      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Asencers-App-Release
          path: build/app/outputs/flutter-apk/app-release.apk

